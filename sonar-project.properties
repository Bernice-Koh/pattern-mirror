# SonarCloud (SonarQube Cloud) analysis config. CI-based scan; see docs/adr/0005-sonarcloud.md.
sonar.projectKey=Bernice-Koh_pattern-mirror
sonar.organization=bernice-koh

# Monorepo as one project: both source trees, backend tests called out so Sonar
# scores them as tests, not as production code to be covered.
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests
sonar.python.version=3.12

# Backend coverage only — the frontend has no test suite yet (tracked separately).
sonar.python.coverage.reportPaths=backend/coverage.xml

# Generated / vendored / migration code is not ours to lint or cover.
sonar.exclusions=**/migrations/**,frontend/dist/**,**/node_modules/**
sonar.coverage.exclusions=backend/tests/**,**/migrations/**,frontend/src/**

# Fail the CI step when the gate fails, so a red gate shows as a failing check.
sonar.qualitygate.wait=true
