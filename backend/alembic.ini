# Alembic configuration. Run from the backend/ directory: `uv run alembic ...`.

[alembic]
script_location = src/pattern_mirror/db/migrations
prepend_sys_path = src
path_separator = os
# Revisions use sequential ids that match the design doc's migration roadmap
# (0001..0005); generate later ones with `alembic revision --rev-id 000N ...`.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
