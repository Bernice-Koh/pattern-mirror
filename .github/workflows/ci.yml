# PR quality gate. Backend (ruff, mypy --strict, pytest on a Postgres service) and frontend
# (eslint, prettier, build) run on every PR.
# See docs/adr/0004-ci-pipeline.md.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (lint, types, tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mirror
          POSTGRES_PASSWORD: mirror
          POSTGRES_DB: pattern_mirror
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mirror -d pattern_mirror"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Format (ruff)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Types (mypy --strict)
        working-directory: backend
        run: uv run mypy

      - name: Tests (pytest)
        working-directory: backend
        env:
          APP_ENV: test
          # Actions sets CI=true and TEST_DATABASE_URL is left unset, so the suite
          # (backend/tests/conftest.py) migrates and runs against this disposable service DB.
          DATABASE_URL: postgresql+psycopg://mirror:mirror@localhost:5432/pattern_mirror
        run: uv run pytest

  frontend:
    name: frontend (lint, format, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Format (prettier)
        working-directory: frontend
        run: npm run format:check

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build
